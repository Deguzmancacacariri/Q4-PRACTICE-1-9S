<!DOCTYPE html>
<html lang="en">
<head>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css";; rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 PRACTICE 1</title>
</head>
<body>
    <h1>Javascript Conditional Statements </h1>
    <!--comment-->

    <input type="text" id="age" class="form-control" placeholder="type here...">

<button class="btn btn-info" onclick="checkAge()">This is my age</button>

    <script>
     //checkAGE
     function checkAge(){

        var age=document.getElementById("age").value;
            if(isNaN(age) || age < 0) {
                alert("Please input a valid number")
            }
            else if (age<18) {
                    alert("You are Underage.")
            }

            else if (age>18){
                alert("You are of legal age")
            }

            else {
                alert("Your age could not be classified.")
            }
        }

    </script>
    
</body>
</html>
